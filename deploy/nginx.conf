# Hardened static host for the Vaquill Word add-in task pane.
# Included inside the base image's http{} block. TLS is terminated by the
# platform (Traefik/Let's Encrypt); this server listens plain HTTP on 8080.
#
# IMPORTANT header-inheritance note: nginx `add_header` does NOT merge across
# levels. A location that declares its own `add_header` drops every inherited
# one. So the security headers live ONLY at the server level, and the per-path
# caching below uses the `expires` directive (not add_header) so the security
# headers keep applying to every asset and HTML response.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    # ---- Security headers (every response, incl. errors via `always`) ----
    # No X-Frame-Options: Word on the web hosts the task pane inside an iframe,
    # so clickjacking is controlled by the CSP frame-ancestors allowlist below,
    # which X-Frame-Options cannot express (it has no per-origin allowlist).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Content Security Policy.
    #  - script-src allows 'unsafe-eval' + 'unsafe-inline' because office.js
    #    requires them to initialize inside the Word WebView (it uses eval /
    #    Function internally and injects an inline bootstrap). Without them the
    #    library never calls Office.onReady and the host shows "Add-in Error,
    #    may not load properly". The app's OWN scripts are external hashed Vite
    #    modules from 'self', so this relaxation only enables the trusted Office
    #    runtime, and the tight connect-src / object-src 'none' still bound the
    #    real XSS surface of this thin static pane.
    #  - style-src allows 'unsafe-inline' for React inline styles.
    #  - connect-src covers our API, the Supabase auth endpoint (custom domain
    #    dbs.vaquill.ai plus the raw project host), and Office.
    #  - frame-ancestors allows the Office web hosts to embed the pane.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.vaquill.ai https://dbs.vaquill.ai https://*.supabase.co https://appsforoffice.microsoft.com https://*.officeapps.live.com https://*.office.com https://*.microsoftonline.com; frame-src 'self' https://appsforoffice.microsoft.com https://login.microsoftonline.com https://login.live.com; frame-ancestors 'self' https://*.officeapps.live.com https://*.office.com https://*.office365.com https://*.microsoft365.com https://*.live.com https://*.sharepoint.com; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/manifest+json;

    # ---- Never expose source maps or dotfiles ----
    location ~ \.map$ {
        return 404;
    }
    location ~ /\. {
        deny all;
    }

    # ---- Platform health check (no add_header, so inheritance is preserved) ----
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- Hashed build assets: content-addressed, cache hard (expires, not add_header) ----
    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }

    # ---- HTML entry points: must revalidate so a redeploy is picked up ----
    # index.html (task pane) and auth.html (PKCE redirect) are real files at the
    # root and match $uri directly; anything else falls back to the task pane.
    location / {
        try_files $uri /index.html;
        expires epoch;
    }
}
